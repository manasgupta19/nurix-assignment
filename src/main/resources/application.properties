spring.application.name=campaign-service

# 1. Database Connectivity with auto-detection disabled
# The 'options' flag forces the session to UTC regardless of the OS timezone
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:nurix_db}?options=-c%20timezone=UTC
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate/JPA - Explicit Dialect and Timezone
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# 3. Web & JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
# This allows Swagger to show your internal models clearly
springdoc.show-actuator=true

# Expose Actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus
# Enable specialized metrics
management.metrics.tags.application=${spring.application.name}
management.endpoint.prometheus.enabled=true

# Scheduler Settings
campaign.scheduler.fixed-delay=5000
campaign.scheduler.initial-delay=1000

# Telephony Mock Settings
campaign.telephony.success-rate=0.7
campaign.telephony.max-latency-ms=1000

# Validation Defaults
campaign.validation.max-concurrency-limit=50